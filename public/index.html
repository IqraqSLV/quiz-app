<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solarvest HR</title>
    <meta
      name="description"
      content="Solarvest HR Policy Assistant — ask about leave, benefits, claims and more"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#1B1C1D" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Solarvest HR" />
    <link rel="icon" sizes="192x192" href="android-chrome-192x192.png" />
    <link rel="icon" sizes="512x512" href="android-chrome-512x512.png" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Solarvest HR" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#00aba9" />
    <meta name="msapplication-TileImage" content="mstile-150x150.png" />
    <meta name="msapplication-config" content="browserconfig.xml" />

    <!-- Pinned Tab  -->
    <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5" />

    <!-- Favicon -->
    <link rel="shortcut icon" href="solarvest-logo.png" type="image/png" />
    <link rel="icon" href="solarvest-logo.png" type="image/png" />

    <!-- Gotham-like font (using Montserrat as free alternative) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
  </body>
</html>
